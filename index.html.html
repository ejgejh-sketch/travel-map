<style>
:root{
  --g1:#1B4332;--g2:#2D6A4F;
  --cream:#FAF8F4;--warm:#F5F1EB;
  --border:#E5DED4;--text:#1C1A17;--muted:#7A6F63;
  --suko:#5B5EDF;--suko-bg:#EEEFFE;
  --kkiri:#D97706;--kkiri-bg:#FFF8EE;
  --pw:380px;--bh:96px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text)}
#hd{position:fixed;top:0;left:0;right:0;height:52px;background:var(--g1);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:1100;box-shadow:0 2px 14px rgba(0,0,0,.28)}
#hd h1{font-family:'Noto Serif KR',serif;font-size:16px;font-weight:700;color:#fff;flex:1}
#hd .sub{font-size:11px;color:rgba(255,255,255,.6);letter-spacing:.5px;display:none}
@media(min-width:460px){#hd .sub{display:block}}
#mb{position:fixed;top:52px;left:0;right:0;height:44px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;z-index:1099;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ml{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap;margin-right:2px}
.mbt{padding:5px 13px;border-radius:20px;border:1.5px solid;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;transition:all .2s;background:#fff}
.mbt:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.14)}
.mbt.active-all{background:var(--g2);color:#fff;border-color:var(--g2)}
.mbt.active-suko{background:var(--suko);color:#fff;border-color:var(--suko)}
.mbt.active-kkiri{background:var(--kkiri);color:#fff;border-color:var(--kkiri)}
.mbt.inactive{color:var(--muted);border-color:var(--border)}
#mw{position:fixed;top:var(--bh);left:0;right:0;bottom:0;z-index:1;transition:right .35s cubic-bezier(.25,.46,.45,.94)}
#mw.po{right:var(--pw)}
#map{width:100%;height:100%}
#rb{display:none;position:absolute;top:0;left:0;right:0;padding:8px 16px;z-index:500;font-size:13px;font-weight:700;align-items:center;gap:8px;backdrop-filter:blur(6px)}
#rb.sm{background:rgba(91,94,223,.88);color:#fff}
#rb.km{background:rgba(217,119,6,.88);color:#fff}
#rb .yl{margin-left:auto;font-size:11px;opacity:.85;color:inherit;text-decoration:none;border:1px solid rgba(255,255,255,.4);padding:3px 10px;border-radius:12px;white-space:nowrap}
#leg{position:absolute;top:12px;right:12px;z-index:490;background:rgba(255,255,255,.97);border-radius:14px;padding:14px 15px;box-shadow:0 4px 20px rgba(0,0,0,.13);min-width:152px;backdrop-filter:blur(10px)}
.lt{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.li{display:flex;align-items:center;gap:8px;padding:4px 5px;border-radius:7px;cursor:pointer;font-size:12px;transition:all .15s}
.li:hover{background:var(--warm)}
.li.off{opacity:.3}
.ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}
#pn{position:fixed;background:#fff;z-index:1200;overflow:hidden;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
@media(min-width:769px){#pn{top:var(--bh);right:0;width:var(--pw);bottom:0;border-left:1px solid var(--border);box-shadow:-6px 0 30px rgba(0,0,0,.1);transform:translateX(100%)}#pn.open{transform:translateX(0)}}
@media(max-width:768px){#pn{left:0;right:0;bottom:0;height:78vh;border-top-left-radius:22px;border-top-right-radius:22px;border-top:1px solid var(--border);box-shadow:0 -10px 40px rgba(0,0,0,.18);transform:translateY(100%)}#pn.open{transform:translateY(0)}#pn::before{content:'';display:block;flex-shrink:0;width:44px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0}}
.pa{height:4px;flex-shrink:0}
.ph{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0;position:relative}
.pb-badge{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.pb-name{font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;line-height:1.3;margin-bottom:6px}
.pb-chip{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:100px;background:var(--warm);color:var(--muted)}
.pc{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:50%;background:var(--warm);border:none;cursor:pointer;font-size:15px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:background .15s}
.pc:hover{background:var(--border)}
.pb{flex:1;overflow-y:auto;padding:18px 20px 24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.addr{font-size:13px;color:var(--muted);margin-bottom:16px;display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.sec{margin-bottom:16px}
.stl{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.stx{font-size:13.5px;line-height:1.7;color:var(--text)}
.tip-card{background:#FFFCF2;border-left:3px solid var(--kkiri);border-radius:0 10px 10px 0;padding:11px 14px;font-size:13px;line-height:1.65;color:#78400A}
.vc{background:var(--suko-bg);border-left:3px solid var(--suko);border-radius:0 10px 10px 0;padding:11px 14px}
.vl{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--suko);margin-bottom:6px}
.vt{font-size:13px;line-height:1.65;color:var(--text)}
.kbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;margin-top:20px;background:#FEE500;color:#191600;border:none;border-radius:12px;font-size:14px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s}
.kbtn:hover{background:#FFD700;transform:translateY(-1px);box-shadow:0 4px 16px rgba(254,229,0,.5)}
.kbtn:active{transform:none}
#bd{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1150;backdrop-filter:blur(2px)}
#bd.show{display:block}
#err{display:none;position:fixed;inset:0;background:rgba(255,255,255,.97);z-index:9999;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
#err h2{font-family:'Noto Serif KR',serif;font-size:20px;margin-bottom:12px;color:var(--g1)}
#err p{font-size:14px;color:var(--muted);line-height:1.8;max-width:440px}
#err code{background:#F5F1EB;padding:2px 8px;border-radius:4px;font-size:13px;font-weight:700;color:var(--g2)}
@media(max-width:460px){#hd h1{font-size:14px}.mbt{padding:5px 10px;font-size:11px}.ml{display:none}}
</style>
</head>

    <circle cx="17" cy="17" r="15" fill="${bg}" stroke="white" stroke-width="3"/>
    <text x="17" y="17" text-anchor="middle" dominant-baseline="central"
      font-size="13" font-weight="bold" fill="${tc}" font-family="sans-serif">${n}</text>
  </svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg),
    new kakao.maps.Size(34,34),
    {offset:new kakao.maps.Point(17,17)}
  );
}

/* ════ 6. INIT ════ */
function initMap(){
  try{
    map=new kakao.maps.Map(document.getElementById('map'),{
      center:new kakao.maps.LatLng(34.75,127.35),
      level:10
    });
    buildLegend();
    drawCatMarkers();
  }catch(e){
    const err=document.getElementById('err');
    err.style.display='flex';
    document.getElementById('cur-domain').textContent=location.origin;
  }
}

/* ════ 7. MARKERS ════ */
function drawCatMarkers(){
  Object.keys(CAT).forEach(cat=>{
    catLayers[cat]=[];
    PLACES.filter(p=>p.cat===cat).forEach(place=>{
      const m=new kakao.maps.Marker({
        position:new kakao.maps.LatLng(place.lat,place.lng),
        image:makeCatIcon(cat)
      });
      kakao.maps.event.addListener(m,'click',()=>openPanel(place,'cat',null));
      m.setMap(map);
      catLayers[cat].push(m);
    });
  });
}

function drawRouteMarkers(rk){
  const route=ROUTES[rk];
  const coords=[];
  routeMarkers=[];
  route.places.forEach(p=>{
    const pos=new kakao.maps.LatLng(p.lat,p.lng);
    const m=new kakao.maps.Marker({
      position:pos,
      image:makeRouteIcon(p.order,route.color,route.tc)
    });
    kakao.maps.event.addListener(m,'click',()=>openPanel(p,'route',rk));
    m.setMap(map);
    routeMarkers.push(m);
    coords.push(pos);
  });
  routePolyline=new kakao.maps.Polyline({
    path:coords,strokeWeight:3,strokeColor:route.color,
    strokeOpacity:0.65,strokeStyle:'shortdash'
  });
  routePolyline.setMap(map);
  const bounds=new kakao.maps.LatLngBounds();
  coords.forEach(c=>bounds.extend(c));
  map.setBounds(bounds);
}

/* ════ 8. MODE SWITCH ════ */
function switchMode(nm){
  if(mode===nm) return;
  mode=nm; closePanel();
  routeMarkers.forEach(m=>m.setMap(null));
  routeMarkers=[];
  if(routePolyline){routePolyline.setMap(null);routePolyline=null;}
  const rb=document.getElementById('rb');
  const lg=document.getElementById('leg');
  ['all','suko','kkiri'].forEach(k=>{
    document.getElementById('btn-'+k).className='mbt '+(k===nm?'active-'+k:'inactive');
  });
  if(nm==='all'){
    Object.keys(CAT).forEach(c=>{
      catLayers[c]&&catLayers[c].forEach(m=>m.setMap(activeCats.has(c)?map:null));
    });
    lg.style.display='block'; rb.style.display='none'; rb.className='';
    map.setCenter(new kakao.maps.LatLng(34.75,127.35)); map.setLevel(10);
  } else {
    Object.keys(CAT).forEach(c=>{
      catLayers[c]&&catLayers[c].forEach(m=>m.setMap(null));
    });
    lg.style.display='none';
    const route=ROUTES[nm];
    rb.style.display='flex'; rb.className=nm==='suko'?'sm':'km';
    rb.innerHTML=`<span>📺 <strong>${route.label}</strong>의 순천 여행 루트 &nbsp;·&nbsp; 총 ${route.places.length}개 장소</span>
      <a href="${route.videoUrl}" target="_blank" rel="noopener" class="yl">▶ 영상 보기</a>`;
    drawRouteMarkers(nm);
  }
}

/* ════ 9. LEGEND ════ */
function buildLegend(){
  const el=document.getElementById('leg');
  let h='<div class="lt">카테고리</div>';
  Object.entries(CAT).forEach(([k,v])=>{
    h+=`<div class="li" id="li-${k}" onclick="toggleCat('${k}')">
      <div class="ld" style="background:${v.color}"></div><span>${v.name}</span></div>`;
  });
  el.innerHTML=h;
}
function toggleCat(cat){
  const el=document.getElementById('li-'+cat);
  if(activeCats.has(cat)){
    activeCats.delete(cat);
    catLayers[cat]&&catLayers[cat].forEach(m=>m.setMap(null));
    el.classList.add('off');
  } else {
    activeCats.add(cat);
    if(mode==='all') catLayers[cat]&&catLayers[cat].forEach(m=>m.setMap(map));
    el.classList.remove('off');
  }
}

/* ════ 10. PANEL ════ */
function openPanel(place,type,rk){
  const pn=document.getElementById('pn');
  let accent,badgeColor,badgeText,body;
  if(type==='cat'){
    const c=CAT[place.cat];
    accent=c.color; badgeColor=c.color; badgeText=c.name;
    body=`<div class="addr">📍 ${place.addr}</div>
      <div class="sec"><div class="stl">추천 이유</div><div class="stx">${place.reason}</div></div>
      <div class="sec"><div class="stl">꿀팁</div><div class="tip-card">${place.tip}</div></div>`;
  } else {
    const route=ROUTES[rk];
    accent=route.color; badgeColor=route.color;
    badgeText=`📺 ${route.label} · ${place.order}번째 방문`;
    body=`<div class="addr">📍 ${place.addr}</div>
      <div class="sec">
        <div class="vc"><div class="vl">🎬 영상에서는</div><div class="vt">${place.video}</div></div>
      </div>
      <div class="sec"><div class="stl">꿀팁</div><div class="tip-card">${place.tip}</div></div>`;
  }
  pn.innerHTML=`
    <div class="pa" style="background:${accent}"></div>
    <div class="ph">
      <div class="pb-badge" style="color:${badgeColor}">${badgeText}</div>
      <div class="pb-name">${place.name}</div>
      ${type==='cat'?`<span class="pb-chip">${place.region}</span>`:''}
      <button class="pc" onclick="closePanel()">✕</button>
    </div>
    <div class="pb">
      ${body}
      <button class="kbtn" onclick="openKakao(${place.lat},${place.lng},'${place.name}')">
        🗺️&nbsp; 카카오맵으로 보기
      </button>
    </div>`;
  pn.classList.add('open');
  document.getElementById('bd').classList.add('show');
  if(window.innerWidth>768){
    document.getElementById('mw').classList.add('po');
    setTimeout(()=>map.relayout(),360);
  } else {
    map.panTo(new kakao.maps.LatLng(place.lat,place.lng));
  }
}
function closePanel(){
  document.getElementById('pn').classList.remove('open');
  document.getElementById('bd').classList.remove('show');
  if(window.innerWidth>768){
    document.getElementById('mw').classList.remove('po');
    setTimeout(()=>map.relayout(),360);
  }
}

/* ════ 11. KAKAO MAP LINK ════ */
function openKakao(lat,lng,name){
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const web=`https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`;
  if(isMobile){
    window.location.href=`kakaomap://look?p=${lat},${lng}`;
    setTimeout(()=>window.open(web,'_blank'),1500);
  } else {
    window.open(web,'_blank');
  }
}

/* ════ BOOT ════ */
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
window.addEventListener('DOMContentLoaded',initMap);
</script>
</body>
</html>
